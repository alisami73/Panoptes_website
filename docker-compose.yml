version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: panoptes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: panoptes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: panoptes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panoptes"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panoptes-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://panoptes:${POSTGRES_PASSWORD:-changeme}@db:5432/panoptes
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://panoptes.blinkpharmacie.ma}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://panoptes.blinkpharmacie.ma}
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /tmp/puppeteer:/tmp/puppeteer

volumes:
  postgres_data:
