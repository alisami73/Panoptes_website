<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f2236"/>
      <stop offset="100%" stop-color="#02040d"/>
    </radialGradient>
    <radialGradient id="iris" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00e5f0"/>
      <stop offset="50%" stop-color="#00C2CB"/>
      <stop offset="100%" stop-color="#0077aa"/>
    </radialGradient>
    <radialGradient id="pupil" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#003355"/>
      <stop offset="100%" stop-color="#000d1a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <ellipse cx="32" cy="32" rx="26" ry="13" fill="none" stroke="#00C2CB" stroke-width="1.5"
    stroke-opacity="0.75" filter="url(#glow)"
    transform="rotate(-15 32 32)"/>

  <circle cx="8" cy="28" r="2.2" fill="#00C2CB" opacity="0.9" filter="url(#glow)"/>
  <circle cx="57" cy="36" r="1.8" fill="#00C2CB" opacity="0.7"/>
  <circle cx="32" cy="19.5" r="1.4" fill="#00C2CB" opacity="0.55"/>

  <path d="M 14 32 Q 24 20 32 20 Q 40 20 50 32 Q 40 44 32 44 Q 24 44 14 32 Z"
    fill="#001a2e" stroke="#00C2CB" stroke-width="1" stroke-opacity="0.6"/>

  <circle cx="32" cy="32" r="8.5" fill="url(#iris)" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="4.5" fill="url(#pupil)"/>
  <circle cx="29.5" cy="29.5" r="1.8" fill="white" opacity="0.7"/>
</svg>
